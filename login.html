<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Chamber Records | Partner Login</title>
  <meta name="description"
    content="Sign in to your Echo Chamber Records partner portal. Manage sync clearance projects, submission reviews, or subscription pre-orders.">
  <meta name="keywords" content="record label login, music partner portal, artist login">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script src="assets/js/rtl-toggle.js"></script>
</head>

<body class="min-vh-100 d-flex flex-column justify-content-between">

  <!-- Top Right Actions (Theme & RTL) -->
  <div class="position-fixed top-0 end-0 p-3 z-3 d-flex gap-2">
    <button class="theme-toggle-btn" aria-label="Toggle dark/light theme"></button>
    <button class="rtl-toggle-btn" aria-label="Toggle right-to-left layout">RTL</button>
  </div>

  <!-- Login Form Area -->
  <main class="py-5 flex-grow-1 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="border p-4 p-md-5 bg-surface scroll-reveal-card animate-fade-up"
            style="border-color: var(--color-border) !important;">
            <div class="text-center mb-4">
              <a class="navbar-brand fs-3 font-display text-accent" href="index.html"
                style="letter-spacing: 0.1em;">ECHO CHAMBER</a>
            </div>
            <h1 class="font-display text-center fs-2 mb-2 text-uppercase">Partner Login</h1>
            <p class="text-secondary font-headings text-center fs-8 mb-4">Access sync tracking and exclusive vaults</p>

            <form class="editorial-form">
              <div class="mb-3">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="you@agency.com" required>
              </div>

              <div class="mb-4">
                <label for="loginPass" class="mb-1">Password</label>
                <div class="position-relative password-toggle-wrap">
                  <input type="password" id="loginPass" class="form-control pe-5" placeholder="••••••••" required>
                  <button type="button"
                    class="btn password-toggle-btn position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent text-secondary p-2"
                    aria-label="Toggle password visibility" style="z-index: 10;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye"
                      viewBox="0 0 16 16">
                      <path
                        d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 4 8 4c2.02 0 3.82.668 5.168 1.957A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12 8 12c-2.02 0-3.82-.668-5.168-1.957A13.133 13.133 0 0 1 1.173 8z" />
                      <path
                        d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
                    </svg>
                  </button>
                </div>
              </div>

              <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check m-0">
                  <input class="form-check-input" type="checkbox" id="rememberMe">
                  <label class="form-check-label font-headings text-secondary fs-8" for="rememberMe">
                    Remember me
                  </label>
                </div>
                <a href="#" class="text-accent fs-8 font-headings">Forgot Password?</a>
              </div>

              <button type="submit"
                class="btn-editorial btn-accent border-0 text-white w-100 py-3 text-center mb-3">Sign In</button>

              <div class="text-center my-4 font-headings text-secondary fs-8 position-relative">
                <span class="bg-surface px-2 position-relative z-1">or continue with</span>
                <div class="position-absolute top-50 start-0 w-100 border-top"
                  style="border-top-color: var(--color-border) !important;"></div>
              </div>

              <div class="row g-2 mb-3">
                <div class="col-6">
                  <button type="button"
                    class="btn btn-editorial w-100 py-2 d-flex align-items-center justify-content-center gap-2 border border-dark bg-transparent text-color-primary font-headings fs-8"
                    style="color: var(--color-text-primary);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                      viewBox="0 0 488 512" class="text-danger">
                      <path
                        d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z" />
                    </svg>
                    Google
                  </button>
                </div>
                <div class="col-6">
                  <button type="button"
                    class="btn btn-editorial w-100 py-2 d-flex align-items-center justify-content-center gap-2 border border-dark bg-transparent text-color-primary font-headings fs-8"
                    style="color: var(--color-text-primary);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                      viewBox="0 0 384 512">
                      <path
                        d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-48.4-19.2-77.9-19.1-38 1-76.4 22-95.6 55.4C9 285.8 30.5 393.7 69.6 454.1c19.6 28.5 42.2 60 72.8 58.8 30.7-1.2 42.4-19.6 79.5-19.6 37.1 0 47.9 19.6 79.9 19 30.9-.6 50.8-28.7 70.3-57.2 22.8-33.1 32.2-65.2 32.4-66.9-.6-.2-62.8-24-63.3-95.3zM286.9 83.1c16.2-20.2 27.2-48.2 24.2-76.2-24.1 1-53.7 16.2-71.1 36.6-15.2 17.6-28.5 45.8-24.8 73.3 26.6 2.1 54.8-13.5 71.7-33.7z" />
                    </svg>
                    Apple
                  </button>
                </div>
              </div>
            </form>

            <div class="text-center font-headings fs-8 mt-4 pt-3 border-top"
              style="border-top-color: var(--color-border) !important;">
              <span class="text-secondary">Need partner access? </span>
              <a href="signup.html" class="text-accent">Request Account</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Minimal Footer -->
  <footer class="py-4 border-top" style="border-top-color: var(--color-border) !important;">
    <div class="container text-center">
      <p class="m-0 font-headings text-secondary" style="font-size:0.8rem;">&copy; 2026 Echo Chamber Records. All Rights
        Reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- GSAP Animation Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/animations.js"></script>
  <script>
    // Password Visibility Toggle script
    document.querySelectorAll('.password-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.password-toggle-wrap').querySelector('input');
        const isPass = input.type === 'password';
        input.type = isPass ? 'text' : 'password';

        // Update eye icon state
        btn.innerHTML = isPass ? `
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 4 8 4c2.02 0 3.82.668 5.168 1.957A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12 8 12c-2.02 0-3.82-.668-5.168-1.957A13.133 13.133 0 0 1 1.173 8z"/>
            <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
          </svg>
        ` : `
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-slash" viewBox="0 0 16 16">
            <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a18.883 18.883 0 0 0-2.79.223L3.904 1.25a.5.5 0 0 0-.708.708l10.5 10.5a.5.5 0 0 0 .707-.707zM8 4c.735 0 1.437.1 2.086.279L8.435 5.93A1.5 1.5 0 0 0 8 5.5a1.5 1.5 0 0 0-1.5 1.5c0 .153.023.3.064.436L4.746 9.756C4.268 9.243 4 8.5 4 8c0-2.02 1.88-3.5 4-3.5zM12.438 12.87a9.906 9.906 0 0 1-4.438.63c-2.12 0-3.879-.668-5.168-1.957A13.133 13.133 0 0 1 1.172 8c.058-.087.122-.183.195-.288C2.553 6.09 5.86 4.3 8 4.3c.535 0 1.05.041 1.54.12l-1.077 1.077A2.5 2.5 0 0 0 8 5.5a2.5 2.5 0 0 0-2.5 2.5c0 .178.02.35.056.516L1.642 12.354a.5.5 0 0 0 .708.708l10.088-10.088z"/>
          </svg>
        `;
      });
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Chamber Records | 404 - Track Not Found</title>
  <meta name="description" content="Error 404 - The track or page you are looking for has been misplaced or deleted. Return to the Echo Chamber Records catalog.">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script src="assets/js/rtl-toggle.js"></script>
</head>
<body class="min-vh-100 d-flex flex-column justify-content-between">

  <!-- Minimal Header / Return Home -->
  <header class="py-4">
    <div class="container text-center text-md-start px-4">
      <a class="navbar-brand fs-3" href="index.html">ECHO CHAMBER</a>
    </div>
  </header>

  <!-- 404 Center Error message -->
  <main class="py-5">
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="mb-4">
            <!-- Rotating/Skewed Retro Tape Icon or Vinyl Mockup -->
            <div class="vinyl-record mx-auto mb-5 animate-vinyl-spin" style="width: 250px; max-width: 80%; animation-play-state: running;">
              <div class="vinyl-label" style="background-image: radial-gradient(circle, var(--color-accent) 0%, #1a1a1a 100%);"></div>
            </div>
          </div>
          
          <h1 class="font-display display-1 text-accent mb-2" style="font-size: 8rem; line-height: 0.85;">404</h1>
          <h2 class="font-headings fw-bold text-uppercase fs-4 mb-4">TRACK NOT FOUND</h2>
          
          <p class="text-secondary font-headings mb-5 max-width-400 mx-auto" style="max-width: 400px;">
            The frequency you are trying to tune into does not exist. It may have been deleted, moved, or clearance was retracted.
          </p>

          <a href="index.html" class="btn-editorial btn-accent border-0 text-white px-5 py-3">Return to Headquarters</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Minimal Footer -->
  <footer class="py-4 border-top" style="border-top-color: var(--color-border) !important;">
    <div class="container text-center">
      <p class="m-0 font-headings text-secondary" style="font-size:0.8rem;">&copy; 2026 Echo Chamber Records. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- GSAP Animation Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
